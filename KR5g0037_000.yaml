body:
  text: 正一論全真坐鉢捷法附楹一有客難曰蓋聞三生萬物大道無私賦命自天皇天弗欺受載於地謂地必厚生非所迎而來死非所送而去道法自然人亦則之吉凶定分各自得也豈是要福所能逺禍乎且聖人垂教應有定期如何世道參差或新或舊九十六種各稱妙化道家復何以㫖教靈寶一法二用故當服膺從之懼乖先王之法行一差毫毛之機長懷千里之失望古興悲咨疑莫辨是以望雲欽響踟蹰仙駕側席下風仰延髙誨答曰探微測妙之說辨幽論玄之事故當求其理顯然徴其形跡為據至理絶言非言無以載其極至德不形非形無以驗其有夫在形言寧無善惡禍是福之所倚故明其有徴也福是禍之所伏故明其有主也有徴有主孰為不信端形不招直影而直影自見知聲無追順響而順響必至倚伏循環寧在定分是以聖人立教遷善伐惡化惡伏善其化用不一者實關人情之有淳薄風俗之有興鄙人淳則滋章不行禮薄則法令競起教以順民化以從俗是以太伯文身於東夷仲尼褰裳於覀祼誠非至德之盛化然應變有方行藏之理抑亦在時博施於民而能濟衆者豈曰無功蓋亦從物情而成業者耳若保專一不離則天清地寧矣此則達人之髙尚非庸才之所及一者正一也張君以正一統世八極無二玄綱一舉六合同風天覆地載教養修道非正一焉可得語其優劣哉余幸㑹大明洪流闡化欽風先聖味道餘生羡章雲梯馳情天路籍素移年間虛巳日不勝飲露秋松荷澤春芳魚悅水深鳥希木茂栖林一枝窺河量腹但才愧尺短情非寸長智乏玄解識非通悟鏤管鑒光何酬明誥難曰聖人設教情無彼此何忌靈寶清齊㫖教塗炭謝邪答曰㫖教齊法及塗炭謝儀共出一卷經中聖人豈容應令修天師之謝而不修天師之齊若其齊可略其謝可換充靈寶闕者恐不但天師不許深非葛君之意特由世學者欲截鶴接鳬耳誠願其長短齊一然要非可相換也難曰塗炭儀所說云悉如靈寶法推之斯言可得兼用答曰塗炭法者由羣生咎障既深非大功不釋宿對根密非塗炭不解結考不解則學仙不成厄世不度天師以漢安元年十月十五曰下㫖教於陽平山以教衆官令入仙目王趙修之卒登上道當爾之時塗炭之謝巳行而靈寶齊儀未敷唯五符而巳豈得兼行推年檢事足明為謬斯乃造作支流穿鑿真文足此數字欲令張葛二教俱同一用信不足有不信矣難曰竊聞議者所說㫖教齊者天師以教治官而巳此是小乘之法非靈寶道士之所宜修答曰天師所說云吾以此法教治官道民令免災厄為後世種民種民之許寧忘道士道士之儔孰非治官治官不修種民焉度十苦八難非功不濟功違正一難與論德在位謀正君子同所懷寶迷邦蓋亦愚夫之所深有失矣難曰法以從善必可化以㑹時為用㫖教齊法雖真而古拙凡朴通居凡素之跡不宜以施盛觀答曰夫信言不美古自常然美言不信今也居之古不㑹今誠如來告未辨盛觀終何所宜若所宜在我有乖大丈夫處𢈲之情必移之於人豈得兼愛之㫖無欲觀妙情歸玄極重察盛觀之意將非聖人之糟粕邪大音希聲非無聲焉是以陽雷動蟄蠢蟲為之解甲大象無形非無形焉是以二儀覆載含生得所戴履五行通風四時成俗萬物負隂抱陽亭毒育養窈然而見精恍兮而示象子未帝之先母無名之始師絶言之業資不可名之教然後抱一以為式矣陳言示形以為不藏至理病是以病也豈可同乎塊然之器木石之流而齊於觀化者哉難曰按前來說靈寶齊儀起於葛氏㫖教齊法出自天師天師葛氏相去近一百許年葛氏未生之前巳有塗炭不宜今者引入靈寶敬如清㫖未詳葛氏所敷為當可用而不宜行邪答曰垂拱而治洪堯之軌墳索爛然盛周之風何必以結繩之純真而苟貶書記之淡泊也古而不今則質在文無今而不古則質喪文行吾疑子以舊故見遺子乃以新知相嫌大略為疑者子復不文質彬彬耳難曰若新舊之教理宜兼行而今子之所修唯舊不新行與言乖的何為許答曰魚鳥異效各自得之飛沈川陸天情不共五常同禀或剛柔殊操余蓬軀籜質紆曲任風若水之念從善如流心忘得失不以寵辱見驚志存天道無親踈間然不勝效新者多邪復留心舊教耳何必非今世之古人後生之一標志哉難曰天師大聖設教救物何令今者廢而不修將非三天之法有鄙正一之化不神通邪答曰上士聞道必行故松喬其人焉下士聞道太天蓋亦丘壑之徒矣至道不行者豈非松喬之黨鮮丘壑之類多故鳳麟罕出而莫用雞駟雲疇以常馳不修之理居其然乎物勢之所之若飊風之所衝人情之所注如驟雨之所泊但飊風不可移崇朝驟雨難為日用耳道隱無名誰與名焉大辨若訥故誰與辨焉知我者希則我者貴焉淩霜之幹不俟陽春易彩既震之雷無待絃鐘示音萬羅捕鳥成功一目鑽燧揚煙興自無朕何必須區區於人物灼灼於榮華哉絶聖棄智民利百倍絶仁棄義民復孝慈絶巧棄利盜賊無有夫天化覆育仁教弘愍大聖恢恢全生濟物豈得崇智棄聖喪德於慈聽者乎蓋非至道之所取矣至道所取引心長霄之上投節清都之官埋迹衆妙之門送心玄玄之無窮宴朝陽以栖影庇太虛以席空揖虛皇以畢性習玄老之祕蹤佩蘭蕙以齊芳尚松桂以易容附青煙以傳誠留白日以照忠情無事於易俗德自可以移風召良友於東華叱鬼爽於北酆正一何所鄙哉想不惑於今日耳相望吾子廓然自曉若被太陽於深夜矣正一論
